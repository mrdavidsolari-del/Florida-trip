  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --orange: #FF6B35; --coral: #FF8C61; --yellow: #FFD166;
    --teal: #06D6A0; --blue: #118AB2; --navy: #073B4C; --pink: #EF476F;
    --sidebar-w: 260px;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Poppins', sans-serif;
    /* Crisp text rendering on all devices */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    /* Prevent iOS rubber-band blur artefacts */
    -webkit-overflow-scrolling: touch;
  }
  /* Force GPU layer for anything that animates — prevents subpixel blur */
  .card, .park-card, .sidebar-item, .stat-card, .btn-primary, .btn-secondary {
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  /* Remove heavy backdrop-blur on mobile where it causes rendering fuzz */
  @media (max-width: 768px) {
    .modal-bg { backdrop-filter: none; -webkit-backdrop-filter: none; background: rgba(0,0,0,0.72); }
    #header { backdrop-filter: none; -webkit-backdrop-filter: none; }
    /* Disable hover lift on touch — avoids stuck-transform blur */
    .card:hover, .park-card:hover, .stat-card:hover { transform: translateZ(0); box-shadow: 0 2px 16px -4px rgba(0,0,0,.08); }
  }

  /* ── BACKGROUND ── */
  body { background: #f8faff; }
  .dark body, .dark { background: #0c1220 !important; }

  /* ── HEADER ── */

    background: linear-gradient(135deg, #073B4C 0%, #118AB2 40%, #06D6A0 100%);
    box-shadow: 0 4px 24px rgba(17,138,178,.35);
  }
  .dark #header {
    background: linear-gradient(135deg, #040f1a 0%, #0a3a52 50%, #055a45 100%);
  }
  .header-logo { letter-spacing: -0.5px; text-shadow: 0 2px 8px rgba(0,0,0,.25); }

  /* ── SIDEBAR ── */
  #sidebar {
    background: linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
    border-right: 1px solid rgba(0,0,0,.06);
  }
  .dark #sidebar {
    background: linear-gradient(180deg, #111827 0%, #0c1220 100%);
    border-right: 1px solid rgba(255,255,255,.06);
  }
  .sidebar-item {
    transition: all .2s cubic-bezier(.4,0,.2,1);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }
  .sidebar-item:hover { transform: translateX(3px); }
  .sidebar-item.active {
    background: linear-gradient(135deg, var(--orange), var(--coral));
    color: white !important;
    box-shadow: 0 4px 16px rgba(255,107,53,.4);
  }
  .sidebar-item.active::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: white; border-radius: 0 2px 2px 0;
  }

  /* ── CARDS ── */
  .card {
    transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s cubic-bezier(.4,0,.2,1);
    border: 1px solid rgba(0,0,0,.05);
    box-shadow: 0 2px 16px -4px rgba(0,0,0,.08);
  }
  .card:hover {
    transform: translateZ(0) translateY(-3px);
    box-shadow: 0 12px 40px -8px rgba(0,0,0,.15);
  }
  .dark .card { border-color: rgba(255,255,255,.06); box-shadow: 0 2px 16px -4px rgba(0,0,0,.4); }
  .dark .card:hover { box-shadow: 0 12px 40px -8px rgba(0,0,0,.5); }

  /* ── GLASS CARD ── */
  .glass {
    background: rgba(255,255,255,.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.6);
  }
  .dark .glass {
    background: rgba(17,24,39,.6);
    border: 1px solid rgba(255,255,255,.08);
  }

  /* ── HERO GRADIENT ── */
  .hero-gradient {
    background: linear-gradient(135deg, #FF6B35 0%, #FF8C61 30%, #FFD166 60%, #06D6A0 100%);
    position: relative; overflow: hidden;
  }
  .hero-gradient::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .dark-hero {
    background: linear-gradient(135deg, #1a0a3e 0%, #0d2b4e 40%, #093326 100%);
  }

  /* ── STAT CARD ── */
  .stat-card {
    position: relative; overflow: hidden;
    border-radius: 20px;
    transition: transform .2s, box-shadow .2s;
  }
  .stat-card::after {
    content: ''; position: absolute; right: -20px; bottom: -20px;
    width: 80px; height: 80px; border-radius: 50%;
    background: rgba(255,255,255,.1);
  }
  .stat-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px -8px rgba(0,0,0,.2); }

  /* ── PROGRESS ── */
  .progress-bar { transition: width .7s cubic-bezier(.4,0,.2,1); }
  .progress-track {
    background: rgba(0,0,0,.06);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
  }
  .dark .progress-track { background: rgba(255,255,255,.1); }

  /* ── BADGE ── */
  .badge {
    display: inline-flex; align-items: center;
    font-size: .6rem; padding: 3px 8px;
    border-radius: 999px; font-weight: 700;
    letter-spacing: .02em; white-space: nowrap;
  }

  /* ── AVATAR ── */
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }

  /* ── BUTTONS ── */
  .btn-primary {
    background: linear-gradient(135deg, var(--orange), var(--coral));
    color: white; font-weight: 700; border-radius: 14px;
    transition: all .2s; box-shadow: 0 4px 16px rgba(255,107,53,.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,107,53,.45); }
  .btn-secondary {
    background: linear-gradient(135deg, #118AB2, #06D6A0);
    color: white; font-weight: 700; border-radius: 14px;
    transition: all .2s; box-shadow: 0 4px 16px rgba(17,138,178,.3);
  }
  .btn-secondary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(17,138,178,.4); }

  /* ── FORM ELEMENTS ── */
  input, textarea, select {
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    border-radius: 12px !important;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--orange) !important;
    box-shadow: 0 0 0 3px rgba(255,107,53,.15) !important;
  }

  /* ── TIMELINE ── */
  .timeline-dot {
    width: 14px; height: 14px; border-radius: 50%;
    flex-shrink: 0; margin-top: 3px;
    box-shadow: 0 0 0 3px rgba(255,255,255,.8);
  }
  .dark .timeline-dot { box-shadow: 0 0 0 3px rgba(17,24,39,.8); }

  /* ── CHECKLIST ── */
  .checklist-item {
    border-radius: 10px;
    transition: background .15s;
  }
  .checklist-item:hover { background: rgba(255,107,53,.06); }

  /* ── ANIMATIONS ── */
  .fade-in { animation: fadeIn .35s cubic-bezier(.4,0,.2,1); }
  @keyframes fadeIn {
    from { opacity:0; transform: translateY(12px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .pop-in { animation: popIn .3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes popIn {
    from { opacity:0; transform: scale(.92); }
    to   { opacity:1; transform: scale(1); }
  }
  .pulse-dot {
    animation: pulseDot 2s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,107,53,.4); }
    50%      { box-shadow: 0 0 0 6px rgba(255,107,53,0); }
  }

  /* ── MODAL ── */
  .modal-bg { backdrop-filter: blur(8px); }
  #modalBox {
    box-shadow: 0 32px 80px rgba(0,0,0,.3);
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 999px; }
  .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); }

  /* ── PRINT ── */
  @media print {
    #sidebar, #header, .no-print { display:none!important; }
    #main { margin:0!important; padding:0!important; }
  }

  /* ── MISC ── */
  .tab-active { border-bottom: 3px solid var(--orange); color: var(--orange); }
  #qr-canvas { display:block; margin:0 auto; }
  .drag-over { border: 2px dashed var(--orange); background: rgba(255,107,53,.08); border-radius: 14px; }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  .park-card {

// themeparks.wiki park name search strings (CORS-friendly API)
const TPW_PARK_NAMES = {
  'Magic Kingdom':        'Magic Kingdom',
  'EPCOT':                'EPCOT',
  'Hollywood Studios':    'Hollywood Studios',
  'Animal Kingdom':       'Animal Kingdom',
  'Universal Studios':    'Universal Studios Florida',
  'Islands of Adventure': 'Islands of Adventure',
  'Epic Universe':        'Epic Universe',
  'SeaWorld Orlando':     'SeaWorld',
  'Volcano Bay':          'Volcano Bay',
};
function xhrGet(url) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', url);
    xhr.onload = () => {
      if(xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(new Error('Bad JSON')); }
      } else { reject(new Error('Server returned '+xhr.status)); }
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.timeout = 8000;
    xhr.send();
  });
}
async function tpwFetch(url) {
  // Three attempts: direct fetch, corsproxy, allorigins
  const proxies = [
    url,
    'https://corsproxy.io/?url=' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  ];
  let lastErr = 'Failed to fetch';
  for(const u of proxies) {
    // try fetch first
    try {
      const r = await fetch(u, {cache:'no-store', mode:'cors'});
      if(r.ok) return r.json();
      lastErr = 'Server returned '+r.status;
      continue;
    } catch(e) { lastErr = e.message||'Network error'; }
    // if fetch failed, try XHR (sometimes handles file:// differently)
    try { return await xhrGet(u); } catch(e2) { lastErr = e2.message||'Network error'; }
  }
  throw new Error(lastErr);
}
async function fetchTPWParkId(parkName) {
  if(!window._tpwDestinations) {
    window._tpwDestinations = await tpwFetch('https://api.themeparks.wiki/v1/destinations');
  }
  const search = (TPW_PARK_NAMES[parkName]||'').toLowerCase();
  if(!search) throw new Error('No live times source for '+parkName);
  for(const dest of window._tpwDestinations.destinations||[]) {
    for(const p of dest.parks||[]) {
      if(p.name&&p.name.toLowerCase().includes(search)) return p.id;
    }
  }
  // fallback: also search destination-level name
  for(const dest of window._tpwDestinations.destinations||[]) {
    if(dest.name&&dest.name.toLowerCase().includes(search)) return dest.id;
  }
  throw new Error('Park not found in directory: '+parkName);
}

// FIREBASE LIVE POLL SYNC
// ============================================================
let _fbDb = null, _fbLive = false;

function fbLoadConfig() {
  try { return JSON.parse(localStorage.getItem('floridaTripFBConfig') || 'null'); } catch(e) { return null; }
}
function fbSaveConfig(cfg) { localStorage.setItem('floridaTripFBConfig', JSON.stringify(cfg)); }

function initFirebase() {
  if (typeof firebase === 'undefined') return;
  const cfg = fbLoadConfig();
  if (!cfg || !cfg.apiKey || !cfg.databaseURL) { updateSyncBadge(); return; }
  try {
    const app = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(cfg);
    _fbDb = firebase.database(app);
    _fbDb.ref('.info/connected').on('value', snap => {
      _fbLive = snap.val() === true;
      updateSyncBadge();
    });
    fbListenPolls();
  } catch(e) { console.warn('Firebase init error:', e.message); updateSyncBadge(); }
}

function updateSyncBadge() {
  const badge = $('syncBadge');
  if (!badge) return;
  const cfg = fbLoadConfig();
  if (!cfg || !cfg.apiKey) {
    badge.innerHTML = `<button onclick="openFirebaseSetup()" class="flex items-center gap-1.5 bg-white/15 hover:bg-white/25 backdrop-blur text-white text-xs font-bold px-3 py-2 rounded-xl border border-white/20 transition">☁️ Sync</button>`;
    return;
  }
  badge.innerHTML = `<button onclick="openFirebaseSetup()" title="Firebase Live Sync" class="flex items-center gap-1.5 bg-white/15 hover:bg-white/25 backdrop-blur text-white text-xs font-bold px-3 py-2 rounded-xl border border-white/20 transition">
    <span class="w-2 h-2 rounded-full inline-block ${_fbLive ? 'bg-green-400 animate-pulse' : 'bg-yellow-400'}"></span>
    <span>${_fbLive ? 'Live' : 'Connecting…'}</span>
  </button>`;
}

function fbWritePoll(pollId) {
  if (!_fbDb) return;
  const poll = S.polls.find(p => p.id === pollId);
  if (!poll) return;
  _fbDb.ref('polls/' + pollId).update({ votes: poll.votes || {}, closed: poll.closed || false })
    .catch(e => console.warn('FB write error:', e));
}

function fbListenPolls() {
  if (!_fbDb) return;
  _fbDb.ref('polls').on('value', snap => {
    const data = snap.val();
    if (!data) return;
    let changed = false;
    Object.entries(data).forEach(([pollId, fbPoll]) => {
      const local = S.polls.find(p => p.id === pollId);
      if (!local) return;
      const newVotes  = fbPoll.votes  || {};
      const newClosed = fbPoll.closed !== undefined ? fbPoll.closed : local.closed;
      if (JSON.stringify(local.votes) !== JSON.stringify(newVotes)) { local.votes = newVotes; changed = true; }
      if (local.closed !== newClosed) { local.closed = newClosed; changed = true; }
    });
    if (changed) { saveState(); if (S.currentSection === 'polls') renderSection(); }
  });
}

function saveFBConfig() {
  const raw = ($('fbConfigPaste').value || '').trim();
  if (!raw) { alert('Please paste your Firebase config.'); return; }
  try {
    // Normalise JS object literal → valid JSON
    // (do NOT strip // with a simple regex — it destroys https:// URLs in the config)
    const json = raw
      .replace(/,\s*([}\]])/g, '$1')       // trailing commas
      .replace(/([{,]\s*)([a-zA-Z_]\w*)\s*:/g, '$1"$2":')  // unquoted keys → "key":
      .replace(/'/g, '"');                 // single → double quotes
    const cfg = JSON.parse(json);
    if (!cfg.apiKey)      { alert('❌ Missing apiKey — please re-copy the full config from Firebase.'); return; }
    if (!cfg.databaseURL) { alert('❌ Missing databaseURL — make sure you created a Realtime Database and included the databaseURL in the config.'); return; }
    fbSaveConfig(cfg);
    closeModal();
    alert('✅ Firebase config saved! Reloading to connect…');
    location.reload();
  } catch(e) {
    alert('❌ Could not parse config.\n\nMake sure you copy the entire firebaseConfig object from the Firebase console (the curly-braces block).');
  }
}

function disconnectFB() {
  if (confirm('Disconnect Firebase? Votes will be local-only until you reconnect.')) {
    localStorage.removeItem('floridaTripFBConfig');
    closeModal();
    location.reload();
  }
}

function $(id) { return document.getElementById(id); }
function el(tag,cls,inner='') { const e=document.createElement(tag); if(cls) e.className=cls; if(inner) e.innerHTML=inner; return e; }
function fmtDate(str) { const d=new Date(str+'T12:00:00'); return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function dayLabel(i) { const d=new Date(S.tripStart+'T12:00:00'); d.setDate(d.getDate()+i); return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function daysUntilFlight() {
  // Inclusive count: today + days until flight (so "3 days" on the Saturday before a Monday flight)
  const now  = new Date();
  const fly  = new Date((S.flyDate||'2026-03-30')+'T00:00:00');
  const nowMidnight = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const flyMidnight = new Date(fly.getFullYear(),fly.getMonth(),fly.getDate());
  const diff = Math.round((flyMidnight-nowMidnight)/(1000*60*60*24));
  return diff > 0 ? diff + 1 : diff; // +1 for inclusive "including today" counting
}
function isFlightDay() {
  const now = new Date();
  const fly = new Date((S.flyDate||'2026-03-30')+'T00:00:00');
  return now.getFullYear()===fly.getFullYear() && now.getMonth()===fly.getMonth() && now.getDate()===fly.getDate();
}
function isTravelDay() {
  // Any day between fly-out and first park day (e.g. March 31 in transit)
  const now      = new Date();
  const nowD     = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const fly      = new Date((S.flyDate||'2026-03-30')+'T00:00:00');
  const parkStart= new Date(S.tripStart+'T00:00:00');
  return nowD > fly && nowD < parkStart;
}
function daysUntil() {
  // Legacy alias used by header counter — points to flight
  return daysUntilFlight();
}
function daysRemaining() {
  const now=new Date(); const end=new Date(S.tripEnd+'T23:59:59');
  const start=new Date(S.tripStart+'T00:00:00');
  if(now<start) return 10;
  const diff=Math.ceil((end-now)/(1000*60*60*24));
  return Math.max(0,diff);
}
function currentTripDay() {
  const now=new Date(); const start=new Date(S.tripStart+'T00:00:00');
  const diff=Math.floor((now-start)/(1000*60*60*24));
  if(diff<0||diff>9) return -1;
  return diff;
}
function genId() { return '_'+Math.random().toString(36).substr(2,9); }
function personById(id) { return S.people.find(p=>p.id===id); }
function avatarBg(i) { return COLORS[i%COLORS.length]; }
function initials(name) { return name.split(' ').map(w=>w[0]).join('').toUpperCase().substr(0,2); }

      class="sidebar-item w-full flex items-center gap-3 px-3 py-2.5 text-sm font-semibold transition ${S.currentSection===item.id ? 'active text-white' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800/60'}">
      <span class="text-base w-6 text-center">${item.icon}</span>
      <span>${item.label}</span>
      ${S.currentSection===item.id ? '<span class="ml-auto w-1.5 h-1.5 rounded-full bg-white/70 pulse-dot"></span>' : ''}
    </button>
  `).join('');
}
function navigate(section) {
  S.currentSection = section;
  saveState();
  buildNav();
  renderSection();
  closeSidebar();
}
function closeSidebar() {
  $('sidebar').classList.add('-translate-x-full');
  $('sidebarOverlay').classList.add('hidden');
}

// ============================================================
// DARK MODE
// ============================================================
function applyDark() {
  if(S.darkMode) document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
  $('darkToggle').textContent = S.darkMode ? '☀️' : '🌙';
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportJSON() {
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='florida-trip-'+Date.now()+'.json'; a.click();
}
function importJSON(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{ try{ S=JSON.parse(ev.target.result); saveState(); applyDark(); buildNav(); renderSection(); updateHeader(); alert('✅ Data imported successfully!'); }catch(err){ alert('❌ Invalid JSON file'); } };
  r.readAsText(file);
  e.target.value='';
}

// ============================================================
// HEADER UPDATE
// ============================================================
function updateHeader() {
  const d = daysUntil();
  const dc = $('dayCounter');
  if(!dc) return;
  const td = currentTripDay();
  const _df = daysUntilFlight();
  if(td>=0)          dc.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-400 pulse-dot inline-block"></span> Day ${td+1} of 10`;
  else if(isFlightDay() || _df===0) dc.innerHTML = `✈️ WE FLY TODAY!`;
  else if(isTravelDay())            dc.innerHTML = `🛬 En route to Florida!`;
  else if(_df>0)     dc.innerHTML = `🛫 ${_df} day${_df!==1?'s':''} to liftoff`;
  else               dc.innerHTML = `🎉 Memories forever!`;
  dc.classList.remove('hidden');

  const sd = $('sidebarDates');
  const sp = $('sidebarPeople');
  if(sd) sd.textContent = `${fmtDate(S.tripStart)} – ${fmtDate(S.tripEnd)}`;
  if(sp) sp.textContent = `${S.people.length} 👥`;
}

// ============================================================
// RENDER SECTION
// ============================================================
function renderSection() {
  const c=$('content');
  c.className='fade-in';
  void c.offsetWidth; // trigger reflow for animation
  c.className='fade-in';
  switch(S.currentSection) {
    case 'dashboard': c.innerHTML=renderDashboard(); break;
    case 'itinerary': c.innerHTML=renderItinerary(); break;
    case 'parkguide': c.innerHTML=renderParkGuide(); break;
    case 'group': c.innerHTML=renderGroup(); break;
    case 'polls': c.innerHTML=renderPolls(); break;
    case 'budget': c.innerHTML=renderBudget(); break;
    case 'attractions': c.innerHTML=renderAttractions(); break;
    case 'maps': c.innerHTML=renderMaps(); break;
    case 'meals': c.innerHTML=renderMeals(); break;
    case 'notes': c.innerHTML=renderNotes(); break;
    case 'extras': c.innerHTML=renderExtras(); break;
  }
  bindSectionEvents();
}

function toggleActivityStatus(day,ai) {

// Helper: get winner text and count for a poll
function pollLeader(poll) {
  const counts = {};
  poll.options.forEach(o => counts[o] = 0);
  Object.values(poll.votes).forEach(v => { if(counts[v] !== undefined) counts[v]++; });
  const max = Math.max(0, ...Object.values(counts));
  if(max === 0) return null;
  const winners = poll.options.filter(o => counts[o] === max);
  return { opt: winners[0], count: max, tied: winners.length > 1 };
}

function renderPolls() {
  const dayPolls = S.polls.filter(p => p.isDay);
  const customPolls = S.polls.filter(p => !p.isDay);
  const totalPeople = S.people.length;

  // Build scoreboard rows
  const scoreboard = dayPolls.map(poll => {
    const leader = pollLeader(poll);
    const totalVotes = Object.keys(poll.votes).length;
    const pct = totalPeople > 0 ? Math.round(totalVotes / totalPeople * 100) : 0;
    return { poll, leader, totalVotes, pct };
  });

  // Count most-wanted parks across all day polls
  const parkTally = {};
  dayPolls.forEach(poll => {
    Object.values(poll.votes).forEach(v => { parkTally[v] = (parkTally[v]||0)+1; });
  });
  const topParks = Object.entries(parkTally).sort((a,b)=>b[1]-a[1]).slice(0,5);

  return `
  <!-- HEADER -->
  <div class="flex items-center justify-between mb-5">
    <div>
      <h1 class="text-2xl font-black">🗳️ Polls &amp; Voting</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">Everyone picks their park for each day. The family decides together!</p>
    </div>
    <button onclick="openAddPoll()" class="btn-primary px-4 py-2 text-sm">➕ Custom Poll</button>
  </div>

  <!-- SCOREBOARD SUMMARY -->
  <div class="rounded-3xl overflow-hidden shadow-xl mb-6" style="background:linear-gradient(135deg,#073B4C,#118AB2,#06D6A0)">
    <div class="p-4 pb-2">
      <div class="flex items-center justify-between">
        <p class="text-white font-black text-base flex items-center gap-2">📊 Live Scoreboard</p>
        <div class="text-right">
          <p class="text-white/60 text-xs">${dayPolls.reduce((a,p)=>a+Object.keys(p.votes).length,0)} total votes cast</p>
          <p class="text-white/60 text-xs">${totalPeople} voters in group</p>
        </div>
      </div>
    </div>
    <div class="px-4 pb-4">
      <div class="grid grid-cols-5 md:grid-cols-10 gap-1.5 mb-3">
        ${scoreboard.map(({poll,leader,totalVotes,pct},i)=>`
          <button onclick="document.getElementById('daypoll-${i}').scrollIntoView({behavior:'smooth'})"
            class="flex flex-col items-center p-2 rounded-xl transition hover:scale-105"
            style="background:rgba(255,255,255,${leader?'.18':'.08'})">
            <span class="text-xs font-black text-white/70">D${i+1}</span>
            <span class="text-xl my-0.5">${leader ? leader.opt.split(' ')[0] : '❓'}</span>
            <span class="text-xs font-bold text-white leading-tight text-center" style="font-size:.55rem">${leader ? leader.opt.replace(/^[^\s]+\s/,'').split(' ').slice(0,1).join('') : 'No votes'}</span>
            <div class="w-full mt-1.5 rounded-full overflow-hidden" style="height:3px;background:rgba(255,255,255,.2)">
              <div class="h-full rounded-full" style="width:${pct}%;background:${pct===100?'#FFD166':'rgba(255,255,255,.7)'}"></div>
            </div>
            <span class="text-white/60 mt-0.5" style="font-size:.55rem">${totalVotes}/${totalPeople}</span>
          </button>
        `).join('')}
      </div>
      ${topParks.length>0?`
      <div class="border-t border-white/20 pt-3">

              <span class="text-white text-xs font-bold">${park.replace(/^[^\s]+\s/,'')}</span>

        </div>
      </div>`:''}
    </div>
  </div>

  <!-- DAY POLLS -->
  <p class="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">🗓️ Vote for each day</p>
  ${dayPolls.map((poll, pi)=>{
    const realIdx = S.polls.indexOf(poll);
    const counts = {};
    poll.options.forEach(o => counts[o] = 0);
    Object.values(poll.votes).forEach(v => { if(counts[v]!==undefined) counts[v]++; });
    const totalVotes = Object.keys(poll.votes).length;
    const maxCount = Math.max(1, ...Object.values(counts));
    const leader = pollLeader(poll);

    return `
    <div id="daypoll-${pi}" class="card bg-white dark:bg-slate-800 rounded-2xl p-5 mb-4">
      <!-- Poll header -->
      <div class="flex items-start justify-between gap-2 mb-3">
        <div>
          <p class="text-xs font-black uppercase tracking-wide mb-0.5" style="color:var(--orange)">Day ${pi+1}</p>
          <h3 class="font-black text-base leading-tight">${poll.question.replace(/^Day \d+ — /,'')}</h3>
        </div>
        <div class="flex items-center gap-1.5 flex-shrink-0">
          ${leader?`<span class="badge bg-yellow-100 text-yellow-700">${leader.tied?'🤝 Tied':'🏆 '+leader.opt.split(' ')[0]}</span>`:''}
          ${!poll.closed?`<button onclick="closePoll(${realIdx})" class="text-xs px-2 py-1 bg-slate-100 dark:bg-slate-700 rounded-lg hover:bg-red-50 text-slate-500 transition">Lock</button>`:'<span class="badge bg-slate-100 text-slate-500">Locked 🔒</span>'}
        </div>
      </div>

      <!-- Vote progress -->
      <div class="flex items-center gap-2 mb-4">
        <div class="flex-1 progress-track">
          <div class="progress-bar h-full rounded-full" style="width:${totalPeople>0?Math.round(totalVotes/totalPeople*100):0}%;background:linear-gradient(90deg,#FF6B35,#06D6A0)"></div>
        </div>
        <span class="text-xs font-bold text-slate-500 flex-shrink-0">${totalVotes}/${totalPeople} voted</span>
      </div>

      <!-- Who voted selector -->
      ${!poll.closed?`
      <div class="flex items-center gap-2 mb-4 p-3 rounded-xl bg-slate-50 dark:bg-slate-700/60">
        <span class="text-sm">🙋</span>
        <span class="text-xs font-bold text-slate-500">I am:</span>
        <select id="voter-day-${pi}" class="flex-1 text-sm border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-1.5 bg-white dark:bg-slate-800 font-semibold">
          ${S.people.map(p=>`<option value="${p.id}">${p.emoji} ${p.name}</option>`).join('')}
        </select>
        ${poll.votes[S.people[0]?.id]?`<span class="text-xs text-green-600 font-bold">✓ Voted</span>`:''}
      </div>
      `:''}

      <!-- Options list -->
      <div class="space-y-2">
        ${poll.options.map(opt => {
          const count = counts[opt]||0;
          const pct = totalVotes > 0 ? Math.round(count/totalVotes*100) : 0;
          const isLeading = count > 0 && count === maxCount;
          const voters = Object.entries(poll.votes)
            .filter(([,v])=>v===opt)
            .map(([pid])=>S.people.find(p=>p.id==pid)?.emoji||'?')
            .join('');
          const safeOpt = opt.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `
          <div class="rounded-xl overflow-hidden border ${isLeading?'border-orange-200 dark:border-orange-800':'border-slate-100 dark:border-slate-700'}">
            <div class="flex items-center gap-3 px-3 py-2.5 ${isLeading?'bg-orange-50 dark:bg-orange-900/20':'bg-white dark:bg-slate-800'}">
              <span class="text-lg flex-shrink-0">${opt.split(' ')[0]}</span>
              <span class="text-sm font-semibold flex-1">${opt.replace(/^[^\s]+\s/,'')}</span>
              <div class="flex items-center gap-2 flex-shrink-0">
                ${voters?`<span class="text-base leading-none" title="Voted">${voters}</span>`:''}
                <span class="text-xs font-bold ${isLeading?'text-orange-600':'text-slate-400'} w-8 text-right">${count>0?count+'v':''}</span>
                ${!poll.closed?`
                  <button onclick="castVote(${realIdx},'${safeOpt}',document.getElementById('voter-day-${pi}').value)"
                    class="text-xs px-3 py-1.5 rounded-lg font-bold transition flex-shrink-0
                    ${isLeading?'text-white shadow-sm':'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-orange-100 hover:text-orange-700'}"
                    style="${isLeading?'background:linear-gradient(135deg,#FF6B35,#FF8C61)':''}">
                    ${count>0?'Change':'Vote'}
                  </button>`:''}
              </div>
            </div>
            ${count>0?`
            <div class="progress-track mx-3 mb-2.5" style="height:4px">
              <div class="progress-bar h-full rounded-full" style="width:${pct}%;background:${isLeading?'linear-gradient(90deg,#FF6B35,#FFD166)':'rgba(156,163,175,.5)'}"></div>
            </div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}

  <!-- CUSTOM POLLS -->
  ${customPolls.length>0?`
  <p class="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3 mt-6">💬 Other Polls</p>
  ${customPolls.map((poll)=>{
    const realIdx = S.polls.indexOf(poll);
    const counts = {};
    poll.options.forEach(o => counts[o] = 0);
    Object.values(poll.votes).forEach(v => { if(counts[v]!==undefined) counts[v]++; });
    const totalVotes = Object.keys(poll.votes).length;
    return `
    <div class="card bg-white dark:bg-slate-800 rounded-2xl p-5 mb-4">
      <div class="flex items-start justify-between gap-2 mb-3">
        <h3 class="font-bold">${poll.question}</h3>
        <div class="flex gap-1 flex-shrink-0">
          ${!poll.closed?`<button onclick="closePoll(${realIdx})" class="text-xs px-2 py-1 bg-slate-100 dark:bg-slate-700 rounded-lg hover:bg-red-50 transition">Close</button>`:'<span class="badge bg-slate-100 text-slate-500">Closed</span>'}
          <button onclick="deletePoll(${realIdx})" class="text-xs p-1.5 text-red-400 hover:text-red-600">🗑️</button>
        </div>
      </div>
      ${!poll.closed?`
      <div class="flex items-center gap-2 mb-3">
        <select id="voter-c-${realIdx}" class="text-sm border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-1.5 bg-white dark:bg-slate-800">
          ${S.people.map(p=>`<option value="${p.id}">${p.emoji} ${p.name}</option>`).join('')}
        </select>
      </div>`:''}
      ${poll.options.map(opt=>{
        const count=counts[opt]||0;
        const pct=totalVotes>0?Math.round(count/totalVotes*100):0;
        const voters=Object.entries(poll.votes).filter(([,v])=>v===opt).map(([pid])=>S.people.find(p=>p.id==pid)?.emoji||'?').join('');
        const safeOpt=opt.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        return `<div class="mb-3">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-sm font-semibold">${opt}</span>
            <div class="flex items-center gap-2">
              ${voters?`<span>${voters}</span>`:''}
              <span class="text-xs text-slate-400">${count} vote${count!==1?'s':''}</span>
              ${!poll.closed?`<button onclick="castVote(${realIdx},'${safeOpt}',document.getElementById('voter-c-${realIdx}').value)"
                class="text-xs px-3 py-1.5 rounded-lg font-bold btn-primary">Vote</button>`:''}
            </div>
          </div>
          <div class="progress-track"><div class="progress-bar h-full rounded-full" style="width:${pct}%;background:linear-gradient(90deg,#FF6B35,#06D6A0)"></div></div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}`:''}
  `;
}

function openAddPoll() {
  openModal(`
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-black text-lg">💬 New Custom Poll</h2>
      <button onclick="closeModal()" class="text-2xl text-slate-400">×</button>
    </div>
    <div class="space-y-3">
      <div><label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Question</label>
        <input id="pqQ" placeholder="e.g. Which restaurant for Saturday dinner?" class="w-full mt-1.5 border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-2.5 bg-white dark:bg-slate-700 text-sm"/></div>
      <div><label class="text-xs font-bold text-slate-500 uppercase tracking-wide">Options <span class="normal-case font-normal">(one per line)</span></label>
        <textarea id="pqOpts" placeholder="Option A&#10;Option B&#10;Option C" class="w-full mt-1.5 border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-2.5 bg-white dark:bg-slate-700 text-sm" rows="5"></textarea></div>
      <button onclick="savePoll()" class="w-full btn-primary py-3 text-sm">Create Poll ✅</button>
    </div>
  `);
}
function savePoll() {
  const q=$('pqQ').value.trim();
  const opts=$('pqOpts').value.split('\n').map(x=>x.trim()).filter(Boolean);
  if(!q||opts.length<2) return alert('Enter a question and at least 2 options');
  S.polls.push({id:genId(),isDay:false,question:q,options:opts,votes:{},closed:false,created:Date.now()});
  saveState(); closeModal(); renderSection();
}
function castVote(pi,opt,personId) {
  if(S.polls[pi].closed) return;
  S.polls[pi].votes[personId]=opt;
  saveState();
  fbWritePoll(S.polls[pi].id);
  renderSection();
}
function closePoll(pi) {
  S.polls[pi].closed=!S.polls[pi].closed;
  saveState();
  fbWritePoll(S.polls[pi].id);
  renderSection();
}
function deletePoll(pi) {
  if(S.polls[pi].isDay) return alert("Day polls can't be deleted – use the Lock button to close voting.");
  if(confirm('Delete this poll?')) { S.polls.splice(pi,1); saveState(); renderSection(); }
}

function renderBudget() {
  const total=S.expenses.reduce((a,e)=>a+parseFloat(e.amount||0),0);
  const byPerson={};
  S.people.forEach(p=>{ byPerson[p.id]={paid:0,owes:0}; });
  S.expenses.forEach(exp=>{
    const amt=parseFloat(exp.amount||0);
    if(byPerson[exp.paidBy]) byPerson[exp.paidBy].paid+=amt;
    const forWhom=exp.forAll?S.people.map(p=>p.id):exp.forPeople||[];
    if(forWhom.length>0) {
      const share=amt/forWhom.length;
      forWhom.forEach(pid=>{ if(byPerson[pid]) byPerson[pid].owes+=share; });
    }
  });
  return `
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-black">💰 Budget & Expenses</h1>
    <button onclick="openAddExpense()" class="bg-orange-400 hover:bg-orange-500 text-white font-bold px-4 py-2 rounded-xl text-sm transition">➕ Add Expense</button>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-6">
    ${statCard('💵','Total Spent','$'+total.toFixed(2),'group total')}
    ${statCard('👤','Per Person (avg)','$'+(total/S.people.length).toFixed(2),'if split evenly')}
    ${statCard('🧾','Receipts',S.expenses.length,'expenses logged')}
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-5 mb-4">
    <h2 class="font-bold mb-3">💳 Quick Log</h2>
    <div class="flex flex-wrap gap-2">
      ${[['Parking','🅿️',15],['Fuel','⛽',50],['Snacks','🍿',20],['Sunscreen','🧴',15],['Souvenirs','🧸',30]].map(([l,e,a])=>`
        <button onclick="quickExpense('${l} ${e}',${a})" class="bg-slate-100 dark:bg-slate-700 hover:bg-orange-50 hover:text-orange-600 text-sm px-3 py-2 rounded-xl font-semibold transition">${e} ${l} ($${a})</button>
      `).join('')}
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-5 mb-4">
    <h2 class="font-bold mb-3">📊 Balances</h2>
    <div class="space-y-2">
      ${S.people.map((p,i)=>{
        const bp=byPerson[p.id]||{paid:0,owes:0};
        const net=bp.paid-bp.owes;
        return `<div class="flex items-center gap-3 p-2 bg-slate-50 dark:bg-slate-700 rounded-xl">
          <span class="avatar ${avatarBg(i)} text-white text-sm">${p.emoji||initials(p.name)}</span>
          <span class="flex-1 text-sm font-semibold">${p.name}</span>
          <span class="text-xs text-slate-400">paid $${bp.paid.toFixed(0)}</span>
          <span class="text-xs font-bold px-2 py-0.5 rounded-full ${net>0.5?'bg-green-100 text-green-700':net<-0.5?'bg-red-100 text-red-700':'bg-slate-100 text-slate-500'}">
            ${net>0.5?'gets back':'owes'} $${Math.abs(net).toFixed(2)}
          </span>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow p-5">
    <h2 class="font-bold mb-3">🧾 All Expenses</h2>
    ${S.expenses.length===0?'<p class="text-sm text-slate-400">No expenses yet.</p>':
      [...S.expenses].reverse().map((exp,i)=>{
        const ri=S.expenses.length-1-i;
        const payer=S.people.find(p=>p.id===exp.paidBy);
        return `<div class="flex items-center gap-3 p-3 border-b border-slate-100 dark:border-slate-700 last:border-0">
          <span class="text-xl">${exp.category||'💸'}</span>
          <div class="flex-1">
            <p class="text-sm font-semibold">${exp.name}</p>
            <p class="text-xs text-slate-400">${payer?payer.name:'Unknown'} paid · ${exp.forAll?'Split all':((exp.forPeople||[]).length+' people')}</p>
          </div>
          <span class="text-sm font-bold text-green-600">$${parseFloat(exp.amount).toFixed(2)}</span>
          <button onclick="deleteExpense(${ri})" class="text-red-400 hover:text-red-600 text-xs">🗑️</button>
        </div>`;
      }).join('')}
  </div>
  `;
}
function openAddExpense() {
  openModal(`
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-black text-lg">💰 Add Expense</h2>
      <button onclick="closeModal()" class="text-2xl">×</button>
    </div>
    <div class="space-y-3">
      <div><label class="text-xs font-bold text-slate-500">Description</label>
        <input id="exName" placeholder="e.g. Parking at Magic Kingdom" class="w-full mt-1 border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-2 bg-white dark:bg-slate-700 text-sm"/></div>
      <div class="flex gap-2">
        <div class="flex-1"><label class="text-xs font-bold text-slate-500">Amount ($)</label>
          <input id="exAmt" type="number" placeholder="0.00" step="0.01" class="w-full mt-1 border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-2 bg-white dark:bg-slate-700 text-sm"/></div>
        <div class="flex-1"><label class="text-xs font-bold text-slate-500">Category</label>
          <select id="exCat" class="w-full mt-1 border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-2 bg-white dark:bg-slate-700 text-sm">
            <option value="🍽️">🍽️ Food</option><option value="🎢">🎢 Parks/Tickets</option>
            <option value="🅿️">🅿️ Parking</option><option value="⛽">⛽ Fuel</option>
            <option value="🛍️">🛍️ Shopping</option><option value="🏨">🏨 Hotel</option><option value="💸">💸 Other</option>
          </select></div>
      </div>
      <div><label class="text-xs font-bold text-slate-500">Paid by</label>
        <select id="exPaidBy" class="w-full mt-1 border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-2 bg-white dark:bg-slate-700 text-sm">
          ${S.people.map(p=>`<option value="${p.id}">${p.emoji} ${p.name}</option>`).join('')}
        </select></div>
      <div>
        <label class="flex items-center gap-2 text-sm font-semibold mb-2">
          <input type="checkbox" id="exForAll" checked onchange="toggleForAll(this.checked)"/> Split evenly among everyone
        </label>
        <div id="exPeopleDiv" class="hidden flex-wrap gap-1 mt-2">
          ${S.people.map(p=>`<label class="flex items-center gap-1 bg-slate-50 dark:bg-slate-700 rounded-full px-3 py-1 text-xs cursor-pointer">
            <input type="checkbox" value="${p.id}" class="exPerson"/> ${p.emoji} ${p.name}</label>`).join('')}
        </div>
      </div>
      <button onclick="saveExpense()" class="w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 rounded-xl transition">Save Expense ✅</button>
    </div>
  `);
}
function toggleForAll(checked) {
  const div=$('exPeopleDiv');
  if(div) div.classList.toggle('hidden',checked);
}
function saveExpense() {
  const name=$('exName').value.trim();
  const amount=$('exAmt').value;
  if(!name||!amount) return alert('Enter description and amount');
  const forAll=$('exForAll').checked;
  let forPeople=[];
  if(!forAll) {
    document.querySelectorAll('.exPerson:checked').forEach(cb=>forPeople.push(parseInt(cb.value)));
    if(forPeople.length===0) forPeople=S.people.map(p=>p.id);
  }
  S.expenses.push({id:genId(),name,amount:parseFloat(amount),category:$('exCat').value,
    paidBy:parseInt($('exPaidBy').value),forAll,forPeople,date:Date.now()});
  saveState(); closeModal(); renderSection();
}
function quickExpense(name,amount) {
  S.expenses.push({id:genId(),name,amount,category:'💸',paidBy:S.people[0].id,forAll:true,forPeople:[],date:Date.now()});
  saveState(); renderSection();
}
function deleteExpense(i) { if(confirm('Delete this expense?')) { S.expenses.splice(i,1); saveState(); renderSection(); } }

function getWaitForRide(name) {
  if(!window._waitTimesData) return null;
  const all = (window._waitTimesData.lands||[]).flatMap(l=>l.rides||[]);
  const clean = s => s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  const n = clean(name);
  return all.find(r => {
    const rn = clean(r.name);
    if(rn===n) return true;
    // one fully contains the other (min 6 chars to avoid false matches)
    if(n.length>=6 && rn.includes(n)) return true;
    if(rn.length>=6 && n.includes(rn)) return true;
    // first 3 significant words match
    const words = n.split(' ').filter(w=>w.length>2);
    const rnWords = rn.split(' ').filter(w=>w.length>2);
    const shared = words.filter(w=>rnWords.includes(w));
    return shared.length>=2 && shared.length>=Math.min(words.length,rnWords.length)-1;
  })||null;
}
function waitColor(m){if(m===0)return'bg-gray-100 text-gray-500';if(m<20)return'bg-green-100 text-green-700';if(m<45)return'bg-yellow-100 text-yellow-700';if(m<75)return'bg-orange-100 text-orange-700';return'bg-red-100 text-red-700';}

// LIVE WAIT TIMES  (themeparks.wiki public API — CORS-friendly)
// ============================================================
async function fetchWaitTimes(parkName) {
  window._waitTimesLoading = true;
  window._waitTimesData    = null;
  window._waitTimesError   = null;
  // Don't force-switch tabs — let the caller decide which tab to show
  if(S.currentSection==='attractions') renderSection();
  try {
    const parkId = await fetchTPWParkId(parkName);
    const data = await tpwFetch('https://api.themeparks.wiki/v1/entity/'+parkId+'/live');
    // Include anything with a status except non-attraction entity types
    const SKIP = new Set(['RESTAURANT','HOTEL','DESTINATION','PARK','RESORT','PARKING']);
    const items = (data.liveData||[]).filter(e=>e.status&&!SKIP.has(e.entityType));
    const rides = items.map(a=>({
      name: a.name,
      is_open: a.status==='OPERATING',
      wait_time: (a.queue&&a.queue.STANDBY&&a.queue.STANDBY.waitTime)||0,
      status: a.status||'CLOSED',
    })).sort((a,b)=>{if(a.is_open!==b.is_open)return a.is_open?-1:1;return b.wait_time-a.wait_time;});
    window._waitTimesData = {lands:[{name:parkName,rides}]};
    window._waitTimesTs = new Date();
  } catch(e) {
    window._waitTimesError = e.message||'Network error';
  }
  window._waitTimesLoading = false;
  if(S.currentSection==='attractions') renderSection();
}

function togglePack(i) { S.checklist.packing[i].done=!S.checklist.packing[i].done; saveState(); renderSection(); }
function toggleRide(park,i) { S.checklist.rides[park][i].done=!S.checklist.rides[park][i].done; saveState(); renderSection(); }
function openAddPackItem() {
  const item=prompt('New packing list item:');
  if(item) { S.checklist.packing.push({id:genId(),text:item,done:false}); saveState(); renderSection(); }
}

function editMeal(dayIdx,meal) {
  const current=S.meals[dayIdx]?.[meal]||'';
  openModal(`
    <div class="flex items-center justify-between mb-4">
      <h2 class="font-black text-lg">✏️ Edit ${meal.charAt(0).toUpperCase()+meal.slice(1)}</h2>
      <button onclick="closeModal()" class="text-2xl">×</button>
    </div>
    <p class="text-xs text-slate-400 mb-3">Day ${dayIdx+1} – ${dayLabel(dayIdx)}</p>
    <textarea id="mealText" class="w-full border border-slate-200 dark:border-slate-600 rounded-xl px-3 py-2 bg-white dark:bg-slate-700 text-sm" rows="3">${current}</textarea>
    <button onclick="saveMeal(${dayIdx},'${meal}')" class="mt-3 w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 rounded-xl transition">Save ✅</button>
  `);
}
function saveMeal(dayIdx,meal) {
  if(!S.meals[dayIdx]) S.meals[dayIdx]={breakfast:'',lunch:'',dinner:''};
  S.meals[dayIdx][meal]=$('mealText').value.trim();
  saveState(); closeModal(); renderSection();
}

function deleteLink(i) { S.links.splice(i,1); saveState(); renderSection(); }

function sendMsg() {
  const text=$('msgText').value.trim();
  const pid=parseInt($('msgPerson').value);
  if(!text) return;
  S.messages.push({id:genId(),pid,text,time:Date.now()});
  $('msgText').value='';
  saveState(); renderSection();
}
function deleteMsg(i) { S.messages.splice(i,1); saveState(); renderSection(); }
function printItinerary() {
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Florida 2026 Itinerary</title>
  <style>body{font-family:sans-serif;max-width:800px;margin:0 auto;padding:20px}h1{color:#F97316}h2{color:#0EA5E9;margin-top:20px;border-bottom:2px solid #eee;padding-bottom:5px}.activity{padding:5px 0;border-bottom:1px solid #f0f0f0}.time{color:#F97316;font-weight:bold;display:inline-block;width:60px}</style>
  </head><body>
  <h1>🎢 ${S.tripName}</h1>
  <p>${fmtDate(S.tripStart)} to ${fmtDate(S.tripEnd)} · ${S.people.length} people · 2 cars</p>
  ${Array.from({length:10},(_,i)=>{
    const day=S.itinerary[i]||{park:'TBD',activities:[]};
    return `<h2>Day ${i+1} – ${dayLabel(i)}: ${day.park}</h2>
    ${(day.activities||[]).map(a=>`<div class="activity"><span class="time">${a.time}</span> <strong>${a.name}</strong> ${a.notes?'– '+a.notes:''}</div>`).join('')}`;
  }).join('')}
  <p style="margin-top:30px;color:#888;font-size:12px">Printed from Florida Family Trip Planner 🌴</p>
  </body></html>`);
  w.document.close(); w.print();
}
function generateQR() {
  const sec=$('qrSection');
  sec.classList.toggle('hidden');
  if(!sec.classList.contains('hidden')) {
    const url=window.location.href;
    $('qrUrl').textContent=url;
    // Simple QR using a public API drawn to canvas via image
    const img=new Image();
    img.crossOrigin='anonymous';
    img.src=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
    img.onload=()=>{ const cv=$('qr-canvas'); const ctx=cv.getContext('2d'); ctx.drawImage(img,0,0,200,200); };
  }
}
function resetData() {
  S=JSON.parse(JSON.stringify(DEFAULT_STATE));
  saveState(); applyDark(); buildNav(); renderSection(); updateHeader();
}

function migrateSavedState() {
  // Always enforce the correct trip dates regardless of what localStorage has saved
  S.flyDate   = '2026-03-30';
  S.tripStart = '2026-04-01';
  S.tripEnd   = '2026-04-10';
  S.tripName  = "Loz & Paul's Family Mega Hol Treat";

  // Always enforce the correct crew names (updates any phone with old placeholder names)
  const crew = [
    {id:1, name:'David',   emoji:'😎', car:1},
    {id:2, name:'Hannah',  emoji:'👩', car:1},
    {id:3, name:'Loz',     emoji:'👩‍🦱', car:1},
    {id:4, name:'Paul',    emoji:'👨', car:1},
    {id:5, name:'Shazza',  emoji:'👩‍🦳', car:2},
    {id:6, name:'James',   emoji:'🧔', car:2},
    {id:7, name:'Zoe',     emoji:'👧', car:2},
    {id:8, name:'Rob',     emoji:'🧑', car:2},
    {id:9, name:'Evelyn',  emoji:'👵', car:1},
    {id:10,name:'Islay',   emoji:'🧒', car:1},
    {id:11,name:'Holly',   emoji:'🌸', car:2},
    {id:12,name:'Jack',    emoji:'🧒‍♂️', car:1},
  ];
  // Merge: keep any existing votes/driver flags, just fix names & emojis
  S.people = crew.map(c => {
    const existing = S.people.find(p => p.id === c.id) || {};
    return { ...existing, id:c.id, name:c.name, emoji:c.emoji, car:c.car, driver: existing.driver||false };
  });

  // Ensure the 10 day-polls exist (add any missing ones)
  const dayPollIds = ['day-0','day-1','day-2','day-3','day-4','day-5','day-6','day-7','day-8','day-9'];
  const dayLabels  = ['Wed 1 Apr','Thu 2 Apr','Fri 3 Apr','Sat 4 Apr','Sun 5 Apr',
                      'Mon 6 Apr','Tue 7 Apr','Wed 8 Apr','Thu 9 Apr','Fri 10 Apr'];
  const parkOpts   = ['🏰 Magic Kingdom','🌍 EPCOT','🎬 Hollywood Studios','🦁 Animal Kingdom',
                      '🎥 Universal Studios','⚡ Islands of Adventure','🌌 Epic Universe',
                      '🐊 Gatorland','🐬 Discovery Cove','🌊 Volcano Bay','🦈 SeaWorld Orlando',
                      '🛍️ Disney Springs','😴 Hotel Pool / Rest Day'];

  dayPollIds.forEach((id, i) => {
    const exists = S.polls.find(p => p.id === id);
    if (!exists) {
      // Insert at position i (before any custom polls)
      S.polls.splice(i, 0, {
        id, isDay:true, dayIndex:i,
        question:`Day ${i+1} — ${dayLabels[i]}: Where do we go?`,
        options: parkOpts, votes:{}, closed:false, created:Date.now()
      });
    } else {
      // Fix question text and options in case they're stale
      exists.isDay    = true;
      exists.dayIndex = i;
      exists.question = `Day ${i+1} — ${dayLabels[i]}: Where do we go?`;
      exists.options  = parkOpts;
    }
  });
  saveState();
}

function init() {
  loadState();
  migrateSavedState();
  applyDark();

  $('darkToggle').onclick=()=>{
    S.darkMode=!S.darkMode;
    saveState(); applyDark();
  };

  $('sidebarToggle').onclick=()=>{
    $('sidebar').classList.toggle('-translate-x-full');
    $('sidebarOverlay').classList.toggle('hidden');
  };

  buildNav();
  updateHeader();
  renderSection();
  initFirebase();        // connect Firebase if config is saved
  updateSyncBadge();     // show Sync button in header

  // Auto-save & header update every minute
  setInterval(updateHeader, 60000);
}

document.addEventListener('DOMContentLoaded', init);
